# This workflow will upload a Python Package using Twine when a release is created
# For more information see: https://help.github.com/en/actions/language-and-framework-guides/using-python-with-github-actions#publishing-to-package-registries

name: Upload Python Package

on:
  workflow_dispatch:
    inputs:
      version_part:
        description: 'Version bump (or "current" to publish without bumping)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - current

jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel 
        pip install -r requirements-dev.txt
    - name: Configure git
      run: |
        git config --local user.email "skullydazed@gmail.com"
        git config --local user.name "Zach White"
    - name: Bump version
      if: github.event.inputs.version_part != 'current'
      run: |
        bumpversion ${{ github.event.inputs.version_part }}
    - name: Push changes
      if: github.event.inputs.version_part != 'current'
      run: git push --follow-tags
    - name: Build and publish
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: |
        python3 -m build
        twine upload --verbose dist/*
